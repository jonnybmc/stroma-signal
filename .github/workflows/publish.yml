name: Publish

on:
  release:
    types: [published]
  # Allow manual re-firing of the publish from the Actions tab — useful
  # when a previous publish failed at the npm step (e.g. transient OIDC
  # auth issue) and we want to retry without deleting / recreating the
  # release tag. Provide the release tag as the input so the workflow
  # checks out the same commit the release points at.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.1.0-rc.3)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # When triggered via workflow_dispatch with a tag input, check
          # out THAT tag instead of the default branch HEAD. Lets us
          # re-fire a failed publish against the same release commit.
          ref: ${{ inputs.tag || github.ref }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2
      - uses: actions/setup-node@v4
        with:
          # Node 24 ships with npm 11.x bundled. npm Trusted Publishing
          # requires npm 11.5.1+ (npm docs). Node 22 ships with npm 10.x
          # which DOES NOT support the OIDC publish-auth flow — that's
          # the documented cause of the misleading 404 we kept hitting.
          # In-place `npm i -g npm@latest` corrupts npm's own deps on
          # hosted runners (MODULE_NOT_FOUND on promise-retry), so we
          # use a Node version that has the right npm bundled.
          # Source: https://docs.npmjs.com/trusted-publishers
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # ── DIAGNOSTICS (remove once publish is reliably green) ────────
      - name: Print runtime versions
        run: |
          echo "::group::Runtime versions"
          echo "node: $(node --version)"
          echo "npm:  $(npm --version)"
          echo "pnpm: $(pnpm --version)"
          echo "::endgroup::"

      - name: Print OIDC token claims (no secrets — claims are safe)
        uses: actions/github-script@v7
        with:
          script: |
            // Request an OIDC token with the npm audience. This is the same
            // audience the npm CLI requests at publish time. Decode the JWT
            // payload to see exactly what claims npm uses to match against
            // the Trusted Publisher policy on npmjs.com.
            const audience = 'npm:registry.npmjs.org';
            let token;
            try {
              token = await core.getIDToken(audience);
            } catch (err) {
              core.error(`OIDC token request FAILED for audience ${audience}: ${err.message}`);
              core.error('This usually means the workflow lacks `permissions: id-token: write` at the job level.');
              throw err;
            }
            const [, payloadB64] = token.split('.');
            const claims = JSON.parse(Buffer.from(payloadB64, 'base64url').toString());
            core.startGroup('OIDC token claims (audience=npm:registry.npmjs.org)');
            console.log(JSON.stringify(claims, null, 2));
            core.endGroup();
            // Surface the fields npm matches against TP policy as notices
            // so they show up at the top of the run summary
            core.notice(`OIDC subject: ${claims.sub}`);
            core.notice(`OIDC repository: ${claims.repository ?? '(missing)'}`);
            core.notice(`OIDC workflow_ref: ${claims.workflow_ref ?? '(missing)'}`);
            core.notice(`OIDC environment: ${claims.environment ?? '(none)'}`);
            core.notice(`OIDC ref: ${claims.ref ?? '(missing)'}`);
            core.notice(`OIDC repository_owner: ${claims.repository_owner ?? '(missing)'}`);

      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e:smoke
      - run: pnpm check:release
        env:
          RELEASE_PUBLISHED_AT: ${{ github.event.release.published_at }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
      - name: Resolve npm dist-tag from release type
        id: npm_tag
        # Pre-releases publish to the `next` dist-tag; stable releases
        # publish to `latest`. For release-event triggers the source of
        # truth is the GitHub Release `prerelease` flag. For
        # workflow_dispatch retries we infer from the tag string (any
        # tag containing `-` is treated as a pre-release per semver
        # convention; e.g. v0.1.0-rc.3, v1.0.0-beta.1).
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.tag }}" == *-* ]]; then
              echo "tag=next" >> "$GITHUB_OUTPUT"
            else
              echo "tag=latest" >> "$GITHUB_OUTPUT"
            fi
          else
            if [[ "${{ github.event.release.prerelease }}" == "true" ]]; then
              echo "tag=next" >> "$GITHUB_OUTPUT"
            else
              echo "tag=latest" >> "$GITHUB_OUTPUT"
            fi
          fi
      # Use `npm publish` directly (not `pnpm publish`). pnpm's publish
      # wrapper requests an OIDC token for sigstore (provenance signing)
      # but does NOT request the OIDC token for npm publish auth — its
      # publish PUT goes out anonymously, which npm rejects with a 404
      # ("Not Found"). Only the npm CLI 11.5+ implements the full OIDC
      # publish-auth flow against npm Trusted Publishers.
      #
      # `--ignore-scripts` skips the package's prepublishOnly hook
      # (which would re-run the build); the workflow already built via
      # `pnpm run ci` above. No NODE_AUTH_TOKEN env: npm 11+ pulls the
      # OIDC token from the workflow's `id-token: write` permission and
      # exchanges it against the trusted-publisher policy on npmjs.com.
      # `--loglevel=verbose` while diagnostics are in place — surfaces the
      # actual HTTP PUT request/response against the registry. When npm
      # rejects the OIDC handshake we see the exact registry error code
      # (e.g. "trusted publisher policy mismatch") instead of the generic
      # 404 fallback. Drop this flag once the publish is reliably green.
      - run: npm publish --provenance --access public --tag ${{ steps.npm_tag.outputs.tag }} --ignore-scripts --loglevel=verbose
        working-directory: packages/signal
