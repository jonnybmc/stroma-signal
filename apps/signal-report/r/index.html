<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <!--
      Defense-in-depth CSP. Every escapeHtml call site is the primary
      defense; CSP catches the case where a future change misses one.
      'unsafe-inline' on style-src is required by the SSR-style template
      literals that emit per-element style="" attributes (74 sites). Once
      those move to classes (post-RC3), the directive can tighten to a
      hash / nonce.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://api.stroma.design; form-action 'self'; frame-ancestors 'none'; base-uri 'none'"
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="icon" type="image/png" href="/signal-stroma-favicon.png" />
    <title>Signal · Tier Report</title>

    <meta name="description" content="See where your real users actually load — network and device tiers behind a single page." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Signal · Stroma" />
    <meta property="og:title" content="Signal · Tier Report" />
    <meta property="og:description" content="See where your real users actually load — network and device tiers behind a single page." />
    <meta property="og:image" content="https://signal.stroma.design/signal-stroma-og-linkedin.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="3600" />
    <meta property="og:image:height" content="1881" />
    <meta property="og:image:alt" content="Signal · Stroma" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Signal · Tier Report" />
    <meta name="twitter:description" content="See where your real users actually load — network and device tiers behind a single page." />
    <meta name="twitter:image" content="https://signal.stroma.design/signal-stroma-og-linkedin.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@300..700&family=Inter+Tight:wght@400..700&family=Geist+Mono:wght@400..600&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@300..700&family=Inter+Tight:wght@400..700&family=Geist+Mono:wght@400..600&display=swap"
      rel="stylesheet"
    />
    <script type="module" src="/src/report-route.ts"></script>
  </head>
  <body>
    <main id="app"></main>
  </body>
</html>
